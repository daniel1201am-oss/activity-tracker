<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f2f2f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="時間管理">
<link rel="manifest" href="todo-manifest.json">
<link rel="icon" type="image/svg+xml" href="todo-icon.svg">
<link rel="apple-touch-icon" href="todo-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<title>每日時間管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;background:#f2f2f7;color:#1c1c1e;
  font-family:'Inter','Noto Sans TC',-apple-system,'SF Pro Text','PingFang TC',sans-serif;
  -webkit-tap-highlight-color:transparent;padding-bottom:100px;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
  overflow-x:hidden;touch-action:manipulation;
  overscroll-behavior-x:none;
  display:flex;flex-direction:column;
}
.topbar{
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-bottom:1px solid #e5e5ea;
}
.topbar-brand div:first-child{font-size:10px;letter-spacing:3px;color:#8e8e93;margin-bottom:2px}
.topbar-brand div:last-child{font-size:17px;font-weight:700}
.page-tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5ea;padding:0 18px}
.page-tab{
  padding:10px 20px;border:none;cursor:pointer;background:transparent;
  font-size:13px;font-weight:500;font-family:inherit;color:#8e8e93;
  border-bottom:2px solid transparent;transition:all .2s
}
.page-tab.active{color:#1c1c1e;border-bottom-color:#ff6b00}
.page{display:none}
.page.active{display:block}
#page-task.active{display:flex;flex-direction:column;flex:1;min-height:0}
#task-swipe-container{position:relative;overflow:hidden;flex:1;min-height:0}
.swipe-hint{
  position:absolute;top:50%;transform:translateY(-50%);font-size:28px;color:#d1d1d6;
  opacity:0;transition:opacity .15s;pointer-events:none;z-index:5
}
.swipe-hint-left{left:16px}.swipe-hint-right{right:16px}
.swipe-hint.visible{opacity:1}

.week-strip-wrap{background:#fff;border-bottom:1px solid #e5e5ea;padding:10px 8px;overflow:hidden;touch-action:pan-y;position:relative}
.week-track{display:flex;gap:0;will-change:transform;transition:none}
.week-strip{display:flex;gap:4px;justify-content:center;flex-shrink:0}
.day-btn{
  flex:1;max-width:48px;padding:6px 2px;border:none;border-radius:14px;
  cursor:pointer;background:transparent;font-family:inherit;text-align:center;transition:all .2s
}
.day-btn .day-name{display:block;font-size:9px;color:#8e8e93;margin-bottom:2px;letter-spacing:.5px}
.day-btn .day-month{display:block;font-size:9px;color:#8e8e93;line-height:1}
.day-btn .day-num{display:block;font-size:16px;font-weight:600;color:#1c1c1e}
.day-btn.today{background:#ff6b00}
.day-btn.today .day-name,.day-btn.today .day-month{color:rgba(0,0,0,.7)}
.day-btn.today .day-num{color:#000}
.day-btn.selected:not(.today){background:#1c1c1e}
.day-btn.selected:not(.today) .day-num{color:#fff}
.day-btn.selected:not(.today) .day-name,.day-btn.selected:not(.today) .day-month{color:#8e8e93}
.hl-dot{width:5px;height:5px;border-radius:50%;background:#334155;margin:2px auto 0;display:none}
.day-btn.has-highlight .hl-dot{display:block}

.section-label{
  padding:10px 18px 4px;font-size:10px;letter-spacing:2px;color:#8e8e93;
  display:flex;align-items:center;gap:6px
}
.section-label::after{content:'';flex:1;height:1px;background:#e5e5ea}
.task-list{padding:0 18px}

.task-card{
  background:#fff;border-radius:14px;padding:12px 12px 10px;margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:flex-start;gap:8px;
  transition:all .2s;position:relative
}
.task-card:active{transform:scale(.98)}
.task-card.highlighted{
  border-left:4px solid #334155;background:#f5f6f8;
  box-shadow:0 2px 8px rgba(51,65,85,.10)
}
.task-card.highlighted .task-title{font-weight:700}
.task-card.done{opacity:.45}
.task-card.done .task-title{text-decoration:line-through}
.task-card.dragging{opacity:.5;transform:scale(.98);pointer-events:none;position:relative;z-index:100;transition:none}
.task-card.drag-over{border-top:3px solid #ff6b00}

.task-check{
  width:22px;height:22px;border-radius:50%;border:2px solid #d1d1d6;
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:transparent;transition:all .2s;margin-top:1px;background:transparent
}
.task-check.done{background:#ff6b00;border-color:#ff6b00;color:#000}
.task-body{flex:1;min-width:0}
.task-title{font-size:15px;line-height:1.4;word-break:break-word;margin-bottom:6px}
.task-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag{
  font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;
  letter-spacing:.3px;white-space:nowrap
}

.tag-goal{background:#e6e6e6;color:#555}
.tag-duration{background:#f2f2f7;color:#8e8e93}
.tag-carried{background:#e8edf3;color:#334155;font-style:italic}
.tag-empty{font-size:10px;color:#aeaeb2;font-style:italic}
.tag-recurring{background:#e8f0fe;color:#1a73e8}
.recurrence-days{display:none;gap:4px;flex-wrap:wrap}
.recurrence-day-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid #e5e5ea;
  background:#fff;font-size:11px;cursor:pointer;font-family:inherit;color:#1c1c1e;transition:all .15s
}
.recurrence-day-btn.selected{background:#ff6b00;border-color:#ff6b00;color:#fff}

.btn-star{
  width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;background:transparent;
  font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .15s
}
.btn-star:hover{transform:scale(1.2)}
.btn-star.on{color:#334155}
.btn-star.off{color:#d1d1d6}

.btn-delete{
  width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;background:transparent;
  font-size:14px;color:#d1d1d6;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all .2s;margin-top:1px
}
.btn-delete:hover{color:#ff3b30;background:#fff0f0}

.list-divider{height:1px;background:#e5e5ea;margin:4px 18px 10px}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5ea;
  padding:10px 18px;display:flex;gap:8px;
  box-shadow:0 -1px 6px rgba(0,0,0,.04);z-index:10
}
.bottom-bar input{
  flex:1;padding:12px 16px;border:2px solid transparent;border-radius:14px;
  background:#f2f2f7;font-size:16px;font-family:inherit;outline:none;transition:border .2s
}
.bottom-bar input:focus{border-color:#ff6b00}
.btn-add{
  width:46px;height:46px;border-radius:14px;border:none;cursor:pointer;
  background:#1c1c1e;color:#fff;font-size:22px;font-weight:300;transition:background .2s;flex-shrink:0
}
.btn-add:hover{background:#ff6b00}

.goals-section{
  background:#fff;border-radius:16px;padding:18px;margin:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06)
}
.goals-section h3{font-size:13px;font-weight:700;margin-bottom:4px}
.goals-section .sub{font-size:10px;color:#8e8e93;margin-bottom:14px}
.goal-item{
  display:flex;align-items:center;justify-content:space-between;gap:4px;
  padding:10px 12px;background:#f9f9fc;border-radius:10px;margin-bottom:6px;font-size:14px
}
.goal-item .meta{font-size:10px;color:#8e8e93}
.goal-item .goal-name{flex:1}
.goal-edit-input{
  flex:1;padding:4px 8px;border-radius:8px;border:2px solid #ff6b00;
  font-size:14px;font-family:inherit;background:#fff;outline:none
}
.btn-del-sm{
  width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;background:transparent;
  font-size:14px;color:#d1d1d6;display:flex;align-items:center;justify-content:center;transition:all .15s
}
.btn-del-sm:hover{color:#ff3b30;background:#fff0f0}
.btn-edit-sm{
  width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;background:transparent;
  font-size:14px;color:#d1d1d6;display:flex;align-items:center;justify-content:center;transition:all .15s
}
.btn-edit-sm:hover{color:#ff6b00;background:#fff0e6}
.add-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.add-row input{
  flex:1;padding:10px 14px;border:2px solid transparent;border-radius:12px;
  background:#f2f2f7;font-size:16px;font-family:inherit;outline:none;transition:border .2s;min-width:0
}
.add-row input:focus,.add-row select:focus{border-color:#ff6b00}
.add-row select{
  width:80px;flex-shrink:0;padding:10px 6px;border-radius:12px;border:2px solid transparent;
  background:#f2f2f7;font-size:16px;font-family:inherit;outline:none
}
.btn-add-sm{
  padding:10px 16px;border-radius:12px;border:none;cursor:pointer;
  background:#1c1c1e;color:#fff;font-size:13px;font-family:inherit;font-weight:500;
  white-space:nowrap;transition:background .2s
}
.btn-add-sm:hover{background:#ff6b00}

.task-expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f2f2f7}
.task-card.expanded .task-expand{display:block}
.expand-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.expand-row select,.expand-row input{
  padding:8px 10px;border-radius:10px;border:1px solid #e5e5ea;
  background:#f9f9fc;font-size:16px;font-family:inherit;outline:none
}
.expand-row select:focus,.expand-row input:focus{border-color:#ff6b00}
.expand-row input[type=number]{width:70px}
.expand-row select{flex:1;min-width:100px}

.empty-state{text-align:center;padding:50px 20px;color:#aeaeb2}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.empty-state .msg{font-size:13px;line-height:1.7}

.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:#1c1c1e;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none
}
.toast.show{opacity:1}
.toast.fade{opacity:0}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div>TIME MANAGEMENT</div>
    <div>每日時間管理</div>
  </div>
</div>

<div class="page-tabs">
  <button class="page-tab active" data-page="task">任務</button>
  <button class="page-tab" data-page="goals">目標</button>
</div>

<!-- TASK PAGE -->
<div class="page active" id="page-task">
  <div class="week-strip-wrap" id="week-strip-wrap">
    <div class="week-track" id="week-track"></div>
  </div>
  <div id="task-swipe-container">
    <div class="swipe-hint swipe-hint-left">◀</div>
    <div class="swipe-hint swipe-hint-right">▶</div>
    <div id="task-content"></div>
  </div>
</div>

<!-- GOALS PAGE -->
<div class="page" id="page-goals">
  <div id="goals-content"></div>
</div>

<div class="toast" id="toast"></div>

<div class="bottom-bar">
  <input id="task-input" placeholder="新增任務..." autocomplete="off">
  <button class="btn-add" id="btn-add">+</button>
</div>

<script>
/* ── DATA LAYER ── */
const LS_TASKS = 'daily-tasks';
const LS_SETTINGS = 'daily-settings';
const LS_RECURRING = 'recurring-templates';

function loadTasks() {
  try { return JSON.parse(localStorage.getItem(LS_TASKS)) || {}; }
  catch { return {}; }
}
function saveTasks(data) { localStorage.setItem(LS_TASKS, JSON.stringify(data)); }

function loadSettings() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_SETTINGS)) || getDefaultSettings();
    // Migrate old goal format {name, domain} → string
    if (raw.goals && raw.goals.length && typeof raw.goals[0] === 'object') {
      raw.goals = raw.goals.map(g => typeof g === 'string' ? g : g.name);
    }
    raw.domains = undefined;
    return raw;
  } catch { return getDefaultSettings(); }
}
function saveSettings(data) { localStorage.setItem(LS_SETTINGS, JSON.stringify(data)); }

function loadRecurringTemplates() {
  try { return JSON.parse(localStorage.getItem(LS_RECURRING)) || []; }
  catch { return []; }
}
function saveRecurringTemplates(data) { localStorage.setItem(LS_RECURRING, JSON.stringify(data)); }

function getDefaultSettings() {
  return {
    goals: ['晉升區域經理', '體脂降到15%', '每月讀兩本書', '每月儲蓄30%']
  };
}

/* ── STATE ── */
let allTasks = loadTasks();
let settings = loadSettings();
let activeDate = getToday();
let weekOffset = 0;
let currentPage = 'task';
let isDragging = false;
let recurringTemplates = loadRecurringTemplates();

function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getWeekMonday(offset) {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + offset * 7);
  return monday;
}

function getWeekDays(offset) {
  const mon = getWeekMonday(offset);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    days.push(d);
  }
  return days;
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getTasks(date) {
  return allTasks[date] || [];
}

function setTasks(date, tasks) {
  allTasks[date] = tasks;
  saveTasks(allTasks);
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ── CARRY OVER ── */
function carryOver(date) {
  if (allTasks[date] && allTasks[date].length > 0) return;
  const yesterday = new Date(date);
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = dateKey(yesterday);
  if (date > getToday()) return; // never carry over to future dates
  const yTasks = allTasks[yesterdayKey] || [];
  const undone = yTasks.filter(t => !t.isDone && !t.isRecurringInstance && !t.recurrence);
  if (undone.length === 0) return;
  const carried = undone.map(t => ({
    ...t, id: genId(), isHighlighted: false, isDone: false, isCarriedOver: true, createdAt: date
  }));
  allTasks[date] = carried;
  saveTasks(allTasks);
}

/* ── RECURRENCE ── */
function shouldRecurOnDate(tmpl, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const created = new Date(tmpl.createdAt + 'T00:00:00');
  if (dateStr <= tmpl.createdAt) return false;
  switch (tmpl.recurrence.type) {
    case 'daily': return true;
    case 'weekly': return d.getDay() === created.getDay();
    case 'weekly-custom': return (tmpl.recurrence.daysOfWeek || []).includes(d.getDay());
    case 'monthly': return d.getDate() === created.getDate();
    default: return false;
  }
}

function generateRecurringInstances(dateStr) {
  let changed = false;
  const existing = allTasks[dateStr] || [];
  for (const tmpl of recurringTemplates) {
    if (!shouldRecurOnDate(tmpl, dateStr)) continue;
    if (existing.some(t => t.recurrenceSourceId === tmpl.id)) continue;
    const instance = {
      id: genId(), title: tmpl.title, domain: null,
      goal: tmpl.goal, estimatedMinutes: tmpl.estimatedMinutes,
      isHighlighted: tmpl.isHighlighted, isDone: false,
      isCarriedOver: false, createdAt: dateStr,
      isRecurringInstance: true, recurrenceSourceId: tmpl.id
    };
    if (!allTasks[dateStr]) allTasks[dateStr] = [];
    allTasks[dateStr].push(instance);
    changed = true;
  }
  if (changed) saveTasks(allTasks);
}

function recurrenceTypeLabel(type, daysOfWeek) {
  const dayNames = ['日','一','二','三','四','五','六'];
  switch (type) {
    case 'daily': return '每天';
    case 'weekly': return '每週';
    case 'weekly-custom': return '每週 ' + (daysOfWeek||[]).map(d => dayNames[d]).join(',');
    case 'monthly': return '每月';
    default: return '';
  }
}

function addRecurringTemplate(task) {
  removeRecurringTemplate(task.id);
  recurringTemplates.push({
    id: task.id, title: task.title, goal: task.goal,
    estimatedMinutes: task.estimatedMinutes, isHighlighted: task.isHighlighted,
    recurrence: task.recurrence ? { ...task.recurrence } : null, createdAt: task.createdAt
  });
  saveRecurringTemplates(recurringTemplates);
}

function removeRecurringTemplate(taskId) {
  recurringTemplates = recurringTemplates.filter(t => t.id !== taskId);
  saveRecurringTemplates(recurringTemplates);
}

/* ── RENDER ── */
function renderOneWeek(offset) {
  const days = getWeekDays(offset);
  const today = getToday();
  const dayNames = ['一','二','三','四','五','六','日'];
  return `<div class="week-strip" data-offset="${offset}">${days.map(d => {
    const dk = dateKey(d);
    const tasks = allTasks[dk] || [];
    const hasHL = tasks.some(t => t.isHighlighted);
    const isToday = dk === today;
    const isSelected = dk === activeDate;
    let cls = 'day-btn';
    if (isToday) cls += ' today';
    else if (isSelected) cls += ' selected';
    if (hasHL) cls += ' has-highlight';
    return `<button class="${cls}" data-date="${dk}">
      <span class="day-name">${dayNames[d.getDay()===0?6:d.getDay()-1]}</span>
      <span class="day-month">${d.getMonth()+1}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="hl-dot"></div>
    </button>`;
  }).join('')}</div>`;
}

function renderWeekStrip(animateIn) {
  const track = document.getElementById('week-track');
  const wrap = document.getElementById('week-strip-wrap');
  const w = wrap.offsetWidth;
  const TOTAL = 20, HALF = 10;
  let html = '';
  for (let i = -HALF; i < TOTAL - HALF; i++) {
    html += renderOneWeek(weekOffset + i);
  }
  track.innerHTML = html;

  track.style.width = (w * TOTAL) + 'px';
  track.querySelectorAll('.week-strip').forEach(s => { s.style.width = w + 'px'; });

  // Center strip (current week) is at index HALF, offset -HALF*w
  track.style.transform = `translateX(${-HALF * w}px)`;

  // Bind day button clicks
  track.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dk = btn.dataset.date;
      activeDate = dk;
      const targetWeekOffset = parseInt(btn.closest('.week-strip').dataset.offset);
      weekOffset = targetWeekOffset;
      renderAll();
    });
  });
}

function renderTaskList() {
  const container = document.getElementById('task-content');
  generateRecurringInstances(activeDate);
  carryOver(activeDate);
  let tasks = getTasks(activeDate);

  if (tasks.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="icon">📋</div>
      <div class="msg">還沒有任務<br>在下方輸入框新增今天的第一個任務吧</div>
    </div>`;
    return;
  }

  const highlighted = tasks.filter(t => t.isHighlighted);
  const normal = tasks.filter(t => !t.isHighlighted);

  // Sort: undone first, done last within each group
  const sortSection = arr => [...arr].sort((a,b) => a.isDone === b.isDone ? 0 : a.isDone ? 1 : -1);

  const dayNames = ['日','一','二','三','四','五','六'];
  const renderCard = t => {
    const tags = [];
    if (t.isCarriedOver) tags.push('<span class="tag tag-carried">從昨日延續</span>');
    if (t.goal) tags.push(`<span class="tag tag-goal">${esc(t.goal)}</span>`);
    if (t.estimatedMinutes) tags.push(`<span class="tag tag-duration">${t.estimatedMinutes}分鐘</span>`);
    if (t.recurrence && !t.isRecurringInstance) {
      tags.push(`<span class="tag tag-recurring">⟳ ${recurrenceTypeLabel(t.recurrence.type, t.recurrence.daysOfWeek)}</span>`);
    }
    if (t.isRecurringInstance) {
      tags.push('<span class="tag tag-recurring">⟳ 重複任務</span>');
    }
    if (tags.length === 0) tags.push('<span class="tag-empty">點擊展開屬性</span>');

    let expandHTML = `
      <div class="expand-row">
        <select data-field="goal"><option value="">選擇目標...</option>${settings.goals.map(g => `<option ${t.goal===g?'selected':''}>${esc(g)}</option>`).join('')}</select>
      </div>
      <div class="expand-row">
        <input type="number" data-field="minutes" placeholder="預估分鐘" value="${t.estimatedMinutes||''}" min="1" max="480">
      </div>`;

    if (!t.isRecurringInstance) {
      const recType = (t.recurrence && t.recurrence.type) || '';
      const selectedDays = (t.recurrence && t.recurrence.daysOfWeek) || [];
      expandHTML += `
      <div class="expand-row">
        <select data-field="recurrence">
          <option value="">不重複</option>
          <option value="daily"${recType==='daily'?' selected':''}>每天</option>
          <option value="weekly"${recType==='weekly'?' selected':''}>每週</option>
          <option value="weekly-custom"${recType==='weekly-custom'?' selected':''}>每週自訂</option>
          <option value="monthly"${recType==='monthly'?' selected':''}>每月</option>
        </select>
      </div>
      <div class="expand-row recurrence-days" data-recurrence-days style="${recType==='weekly-custom'?'display:flex':'display:none'}">
        ${dayNames.map((dn,i) => `<button type="button" class="recurrence-day-btn${selectedDays.includes(i)?' selected':''}" data-day="${i}">${dn}</button>`).join('')}
      </div>`;
    }

    expandHTML += '';

    return `<div class="task-card${t.isHighlighted?' highlighted':''}${t.isDone?' done':''}" data-id="${t.id}" draggable="true">
      <div class="task-check${t.isDone?' done':''}" data-action="toggle">${t.isDone?'✓':''}</div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-tags">${tags.join('')}</div>
        <div class="task-expand">${expandHTML}</div>
      </div>
      <button class="btn-star${t.isHighlighted?' on':' off'}" data-action="star">${t.isHighlighted?'★':'☆'}</button>
      <button class="btn-delete" data-action="delete">✕</button>
    </div>`;
  };

  let html = '';
  if (highlighted.length > 0) {
    html += '<div class="section-label">今日重點</div><div class="task-list">';
    html += sortSection(highlighted).map(renderCard).join('');
    html += '</div><div class="list-divider"></div>';
  }
  html += '<div class="section-label">待辦事項</div><div class="task-list">';
  html += sortSection(normal).map(renderCard).join('');
  html += '</div>';

  container.innerHTML = html;

  // Event delegation
  container.querySelectorAll('.task-card').forEach(card => {
    const id = card.dataset.id;
    card.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (action === 'toggle') { toggleDone(id); return; }
      if (action === 'star') { toggleHighlight(id); return; }
      if (action === 'delete') { deleteTask(id); return; }
      // Click card body = expand
      if (!e.target.closest('button') && !e.target.closest('select') && !e.target.closest('input')) {
        card.classList.toggle('expanded');
      }
    });
    // Edit fields
    card.querySelectorAll('select, input').forEach(el => {
      el.addEventListener('change', () => updateTaskFields(id));
      el.addEventListener('click', e => e.stopPropagation());
    });
    // Recurrence day buttons
    card.querySelectorAll('.recurrence-day-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        btn.classList.toggle('selected');
        updateTaskFields(id);
      });
    });
    // Recurrence select toggle day picker visibility
    const recSelect = card.querySelector('[data-field="recurrence"]');
    if (recSelect) {
      recSelect.addEventListener('change', () => {
        const daysRow = card.querySelector('[data-recurrence-days]');
        if (daysRow) daysRow.style.display = recSelect.value === 'weekly-custom' ? 'flex' : 'none';
      });
    }
    // Drag
    card.addEventListener('dragstart', handleDragStart);
    card.addEventListener('dragover', handleDragOver);
    card.addEventListener('dragleave', handleDragLeave);
    card.addEventListener('drop', handleDrop);
    card.addEventListener('dragend', handleDragEnd);
    // Long press for mobile drag
    card.addEventListener('touchstart', handleTouchStart, {passive:false});
    card.addEventListener('touchmove', handleTouchMove, {passive:false});
    card.addEventListener('touchend', handleTouchEnd);
    card.addEventListener('touchcancel', handleTouchCancel);
  });
}

function renderGoalsPage() {
  const container = document.getElementById('goals-content');
  container.innerHTML = `
    <div class="goals-section">
      <h3>目標管理</h3>
      <div class="sub">設定你想達成的目標</div>
      ${settings.goals.map(g => `
        <div class="goal-item" data-name="${esc(g)}">
          <span class="goal-name">${esc(g)}</span>
          <input class="goal-edit-input" style="display:none" value="${esc(g)}">
          <button class="btn-edit-sm" data-action="edit-goal">✎</button>
          <button class="btn-del-sm" data-action="del-goal">✕</button>
        </div>
      `).join('')}
      <div class="add-row">
        <input id="new-goal-name" placeholder="新增目標名稱...">
        <button class="btn-add-sm" id="btn-add-goal">+ 新增</button>
      </div>
    </div>`;

  // Delete goal
  container.querySelectorAll('[data-action="del-goal"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.closest('.goal-item').dataset.name;
      settings.goals = settings.goals.filter(g => g !== name);
      saveSettings(settings);
      showToast(`已刪除目標「${name}」`);
      renderAll();
    });
  });

  // Edit goal — switch to inline input
  container.querySelectorAll('[data-action="edit-goal"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.closest('.goal-item');
      const oldName = item.dataset.name;
      const span = item.querySelector('.goal-name');
      const inp = item.querySelector('.goal-edit-input');
      span.style.display = 'none';
      inp.style.display = '';
      inp.focus();
      inp.select();
      const commit = () => {
        const newName = inp.value;
        renameGoal(oldName, newName);
      };
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { commit(); } });
      inp.addEventListener('blur', () => { commit(); }, {once:true});
    });
  });

  // Add goal
  const btnGoal = document.getElementById('btn-add-goal');
  const inpGoal = document.getElementById('new-goal-name');
  if (btnGoal) {
    btnGoal.addEventListener('click', () => addGoal(inpGoal));
    inpGoal.addEventListener('keydown', e => { if (e.key==='Enter') addGoal(inpGoal); });
  }
}

function renderAll() {
  renderWeekStrip();
  if (currentPage === 'task') renderTaskList();
  if (currentPage === 'goals') renderGoalsPage();
}

/* ── TASK ACTIONS ── */
function addTask() {
  const input = document.getElementById('task-input');
  const title = input.value.trim();
  if (!title) return;
  const task = {
    id: genId(), title, domain: null, goal: null,
    estimatedMinutes: null, isHighlighted: false,
    isDone: false, isCarriedOver: false, createdAt: activeDate
  };
  if (!allTasks[activeDate]) allTasks[activeDate] = [];
  allTasks[activeDate].push(task);
  saveTasks(allTasks);
  input.value = '';
  input.blur();
  renderAll();
}

function toggleDone(id) {
  const tasks = allTasks[activeDate] || [];
  const t = tasks.find(t => t.id === id);
  if (t) { t.isDone = !t.isDone; saveTasks(allTasks); }
  renderAll();
}

function toggleHighlight(id) {
  const tasks = allTasks[activeDate] || [];
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (!t.isHighlighted) {
    const count = tasks.filter(t => t.isHighlighted).length;
    if (count >= 5) { showToast('最多 5 個重點任務'); return; }
  }
  t.isHighlighted = !t.isHighlighted;
  saveTasks(allTasks);
  renderAll();
}

function deleteTask(id) {
  if (!allTasks[activeDate]) return;
  const t = allTasks[activeDate].find(t => t.id === id);
  if (!t) return;
  if (t.recurrence) {
    if (confirm('是否也刪除所有未來的重複任務？')) removeRecurringTemplate(id);
  } else if (t.isRecurringInstance) {
    if (confirm('是否也停止此任務的未來重複？')) removeRecurringTemplate(t.recurrenceSourceId);
  }
  allTasks[activeDate] = allTasks[activeDate].filter(t => t.id !== id);
  saveTasks(allTasks);
  renderAll();
}

function updateTaskFields(id) {
  const tasks = allTasks[activeDate] || [];
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  const goal = card.querySelector('[data-field="goal"]')?.value || null;
  const min = parseInt(card.querySelector('[data-field="minutes"]')?.value) || null;
  t.goal = goal; t.estimatedMinutes = min;
  if (!t.isRecurringInstance) {
    const recSelect = card.querySelector('[data-field="recurrence"]');
    const recType = recSelect ? (recSelect.value || null) : null;
    if (recType) {
      const days = recType === 'weekly-custom'
        ? Array.from(card.querySelectorAll('.recurrence-day-btn.selected')).map(b => parseInt(b.dataset.day))
        : null;
      t.recurrence = { type: recType, daysOfWeek: days };
      addRecurringTemplate(t);
    } else {
      t.recurrence = null;
      removeRecurringTemplate(t.id);
    }
  }
  saveTasks(allTasks);
  renderAll();
}

/* ── GOALS ACTIONS ── */
function addGoal(input) {
  const name = input.value.trim();
  if (!name) return;
  if (settings.goals.includes(name)) { showToast('目標已存在'); return; }
  settings.goals.push(name);
  saveSettings(settings);
  input.value = '';
  renderAll();
}
function renameGoal(oldName, newName) {
  newName = newName.trim();
  if (!newName || newName === oldName) return;
  if (settings.goals.includes(newName)) { showToast('目標已存在'); return; }
  const idx = settings.goals.indexOf(oldName);
  if (idx !== -1) settings.goals[idx] = newName;
  saveSettings(settings);
  // Update all tasks referencing the old goal name
  for (const dk of Object.keys(allTasks)) {
    for (const t of (allTasks[dk] || [])) {
      if (t.goal === oldName) t.goal = newName;
    }
  }
  saveTasks(allTasks);
  renderAll();
  showToast(`已更新目標「${newName}」`);
}

/* ── DRAG & DROP ── */
let dragId = null;
function handleDragStart(e) {
  dragId = this.dataset.id;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (this.dataset.id !== dragId) this.classList.add('drag-over');
}
function handleDragLeave(e) {
  this.classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  if (this.dataset.id === dragId || !dragId) return;
  const tasks = allTasks[activeDate] || [];
  const fromIdx = tasks.findIndex(t => t.id === dragId);
  const toIdx = tasks.findIndex(t => t.id === this.dataset.id);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = tasks.splice(fromIdx, 1);
  tasks.splice(toIdx, 0, moved);
  saveTasks(allTasks);
  renderAll();
}
function handleDragEnd(e) {
  this.classList.remove('dragging');
  dragId = null;
  document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
}

/* ── LONG PRESS MOBILE DRAG ── */
let touchStartTime, touchStartX, touchStartY, touchCard, lastDropTarget;

function handleTouchStart(e) {
  touchCard = this;
  touchStartTime = Date.now();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}

function handleTouchMove(e) {
  if (!touchCard) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  if (!isDragging) {
    // 400ms hold + finger stayed within 10px to activate
    if (Date.now() - touchStartTime > 400 && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
      isDragging = true;
      touchCard.classList.add('dragging');
      e.preventDefault();
    }
    return;
  }

  e.preventDefault();
  touchCard.style.transform = `scale(.98) translateY(${dy}px)`;

  // Find card under finger (pointer-events:none on .dragging lets us see through)
  const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
  const cardUnder = el?.closest('.task-card');

  if (lastDropTarget && lastDropTarget !== cardUnder) {
    lastDropTarget.classList.remove('drag-over');
  }
  if (cardUnder && cardUnder !== touchCard) {
    cardUnder.classList.add('drag-over');
    lastDropTarget = cardUnder;
  }
}

function handleTouchEnd(e) {
  if (isDragging) {
    const targetCard = lastDropTarget;

    // Clean up visuals
    touchCard.classList.remove('dragging');
    touchCard.style.transform = '';
    touchCard.style.zIndex = '';
    if (lastDropTarget) lastDropTarget.classList.remove('drag-over');

    // Perform reorder
    if (targetCard && targetCard !== touchCard) {
      const tasks = getTasks(activeDate);
      const fromIdx = tasks.findIndex(t => t.id === touchCard.dataset.id);
      const toIdx = tasks.findIndex(t => t.id === targetCard.dataset.id);
      if (fromIdx >= 0 && toIdx >= 0 && fromIdx !== toIdx) {
        const [moved] = tasks.splice(fromIdx, 1);
        tasks.splice(toIdx, 0, moved);
        saveTasks(allTasks);
        renderAll();
        isDragging = false;
        touchCard = null;
        lastDropTarget = null;
        return;
      }
    }
  }

  isDragging = false;
  touchCard = null;
  lastDropTarget = null;
}

function handleTouchCancel(e) {
  if (isDragging) {
    touchCard.classList.remove('dragging');
    touchCard.style.transform = '';
    touchCard.style.zIndex = '';
    if (lastDropTarget) lastDropTarget.classList.remove('drag-over');
  }
  isDragging = false;
  touchCard = null;
  lastDropTarget = null;
}

/* ── SWIPE WEEK (momentum) ── */
(function bindSwipe() {
  const wrap = document.getElementById('week-strip-wrap');
  const track = document.getElementById('week-track');
  if (!wrap || !track) return;
  const TOTAL = 20, HALF = 10;
  let startX = 0, baseX = 0, tracking = false, animFrame = 0;
  let velSamples = []; // [{t, x}]

  function getCenter() { return -HALF * wrap.offsetWidth; }

  function getCurrentTx() {
    const m = getComputedStyle(track).transform;
    if (!m || m === 'none') return getCenter();
    const nums = m.match(/matrix\(([^)]+)\)/);
    if (!nums) return getCenter();
    return parseFloat(nums[1].split(',')[4]);
  }

  function commitSwipe(e) {
    if (!tracking) return;
    tracking = false;
    const w = wrap.offsetWidth;
    const dx = e.changedTouches[0].clientX - startX;

    // Calculate velocity from recent samples (px/ms)
    let velocity = 0;
    if (velSamples.length >= 2) {
      const first = velSamples[0];
      const last = velSamples[velSamples.length - 1];
      const dt = last.t - first.t;
      if (dt > 0) velocity = (last.x - first.x) / dt;
    }
    velSamples = [];

    // Project total displacement: gesture + inertia
    const inertiaPx = velocity * 200;
    const totalDx = dx + inertiaPx;
    let weekShift = -Math.round(totalDx / w);
    weekShift = Math.max(-(HALF-1), Math.min(HALF-1, weekShift));

    if (weekShift !== 0) {
      weekOffset += weekShift;
      baseX = baseX - weekShift * w;
    }

    // Dynamic duration based on distance to travel
    const currentTx = getCurrentTx();
    const dist = Math.abs(baseX - currentTx);
    const duration = Math.max(400, Math.min(1100, dist * 1.5));

    track.style.transition = `transform ${duration}ms cubic-bezier(0.25,0.7,0.35,1)`;
    track.style.transform = `translateX(${baseX}px)`;

    clearTimeout(animFrame);
    animFrame = setTimeout(() => {
      track.style.transition = 'none';
      renderAll();
    }, duration);
  }

  wrap.addEventListener('touchstart', e => {
    // Interrupt any running animation — grab current position
    track.style.transition = 'none';
    baseX = getCurrentTx();
    startX = e.touches[0].clientX;
    tracking = true;
    velSamples = [{t: Date.now(), x: startX}];
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!tracking) return;
    const now = Date.now();
    const x = e.touches[0].clientX;
    velSamples.push({t: now, x});
    // Keep last 50ms of samples
    while (velSamples.length > 1 && now - velSamples[0].t > 50) velSamples.shift();
    const dx = x - startX;
    const w = wrap.offsetWidth;
    const tx = Math.max(-(TOTAL-1)*w, Math.min(0, baseX + dx));
    track.style.transform = `translateX(${tx}px)`;
  }, {passive:true});

  document.addEventListener('touchend', commitSwipe, {passive:true});
  document.addEventListener('touchcancel', commitSwipe, {passive:true});
})();

/* ── SWIPE TASK AREA (day navigation) ── */
(function bindTaskSwipe() {
  const container = document.getElementById('task-swipe-container');
  const content = document.getElementById('task-content');
  const hintLeft = document.querySelector('.swipe-hint-left');
  const hintRight = document.querySelector('.swipe-hint-right');
  if (!container || !content) return;

  const THRESHOLD = 80;
  const ACTIVATE = 20;
  const BIAS = 1.5;

  let tracking = false, active = false, startX = 0, startY = 0, currentDx = 0;

  function getAdjacentDate(dir) {
    const d = new Date(activeDate + 'T00:00:00');
    d.setDate(d.getDate() + dir);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function springBack() {
    content.style.transition = 'transform 0.3s ease-out';
    content.style.transform = 'translateX(0)';
    setTimeout(() => { content.style.transition = 'none'; content.style.transform = ''; }, 300);
  }

  container.addEventListener('touchstart', e => {
    if (isDragging) return;
    content.style.transition = 'none';
    content.style.transform = '';
    tracking = true;
    active = false;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    currentDx = 0;
  }, {passive:true});

  container.addEventListener('touchmove', e => {
    if (!tracking || isDragging) { tracking = false; return; }
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;

    if (!active) {
      if (Math.abs(dx) > ACTIVATE && Math.abs(dx) > Math.abs(dy) * BIAS) {
        active = true;
      } else if (Math.abs(dy) > 10 && Math.abs(dy) > Math.abs(dx)) {
        tracking = false;
        return;
      } else {
        return;
      }
    }

    e.preventDefault();
    e.stopPropagation();
    currentDx = dx;
    content.style.transform = `translateX(${dx}px)`;
    if (hintLeft) hintLeft.classList.toggle('visible', dx > 0);
    if (hintRight) hintRight.classList.toggle('visible', dx < 0);
  }, {passive:false});

  container.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    if (hintLeft) hintLeft.classList.remove('visible');
    if (hintRight) hintRight.classList.remove('visible');

    if (!active) return;
    active = false;

    const w = container.offsetWidth;
    const dx = currentDx;

    if (Math.abs(dx) < THRESHOLD) { springBack(); return; }

    const dir = dx > 0 ? -1 : 1;
    const newDate = getAdjacentDate(dir);
    const dirOut = dir > 0 ? -w : w;

    content.style.transition = 'transform 0.25s ease-out';
    content.style.transform = `translateX(${dirOut}px)`;

    content.addEventListener('transitionend', function onOut() {
      content.removeEventListener('transitionend', onOut);
      content.style.transition = 'none';

      activeDate = newDate;
      const d = new Date(newDate + 'T00:00:00');
      const today = new Date(getToday() + 'T00:00:00');
      const diffDays = Math.round((d - today) / 86400000);
      weekOffset = Math.floor(diffDays / 7);

      renderAll();

      content.style.transition = 'none';
      content.style.transform = `translateX(${-dirOut}px)`;
      content.offsetHeight;
      content.style.transition = 'transform 0.25s ease-out';
      content.style.transform = 'translateX(0)';

      setTimeout(() => {
        content.style.transition = 'none';
        content.style.transform = '';
      }, 260);
    }, {once:true});
  }, {passive:true});

  container.addEventListener('touchcancel', e => {
    if (!tracking) return;
    tracking = false;
    active = false;
    currentDx = 0;
    if (hintLeft) hintLeft.classList.remove('visible');
    if (hintRight) hintRight.classList.remove('visible');
    content.style.transition = 'none';
    content.style.transform = '';
  });
})();

/* ── PAGE SWITCHING ── */
document.querySelectorAll('.page-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const page = tab.dataset.page;
    // 再次點擊任務頁籤 → 回到今天
    if (page === 'task' && currentPage === 'task') {
      activeDate = getToday();
      weekOffset = 0;
      renderAll();
      return;
    }
    document.querySelectorAll('.page-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    currentPage = page;
    document.getElementById('page-' + currentPage).classList.add('active');
    document.querySelector('.bottom-bar').style.display = currentPage === 'task' ? 'flex' : 'none';
    if (currentPage === 'goals') { renderGoalsPage(); }
    else { renderAll(); }
  });
});

/* ── INPUT ── */
document.getElementById('btn-add').addEventListener('click', addTask);
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});
document.getElementById('task-input').addEventListener('blur', () => {
  setTimeout(() => { window.scrollTo(0, 0); }, 100);
});

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('fade');
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => { t.classList.add('fade'); }, 1500);
}

/* ── HELPERS ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── INIT ── */
generateRecurringInstances(activeDate);
carryOver(activeDate);
renderAll();
</script>
